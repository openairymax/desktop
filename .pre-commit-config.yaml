# Pre-Commit Hooks for Desktop
# 安装: pip install pre-commit && pre-commit install
# 运行: pre-commit run --all-files
# 文档: https://pre-commit.com

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(png|jpg|jpeg|gif|ico|pdf|zip|tar|gz)$
      - id: end-of-file-fixer
        exclude: \.(png|jpg|jpeg|gif|ico|pdf|zip|tar|gz)$
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.2
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: \.(png|jpg|jpeg|gif|ico|pdf|zip|tar|gz|lock|map)$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.8.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, css, html, json, markdown, yaml]
        args: [--print-width=100]
        exclude: \.(min\.js|min\.css)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.42.0
    hooks:
      - id: eslint
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        additional_dependencies:
          - eslint
          - eslint-plugin-react
        args: ['--fix']

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.23.3
    hooks:
      - id: check-github-workflows
      - id: check-package-json

exclude: ^(node_modules/|dist/|build/|\.venv/|vendor/|\.cache/)

default_language_version:
  python: python3

default_stages: [commit, push]

color: true
verbose: true