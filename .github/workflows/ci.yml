name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: License check
        run: |
          if [ -f "LICENSE" ]; then
            echo "[OK] LICENSE present"
          else
            echo "[NO] LICENSE missing" && exit 1
          fi

      - name: README check
        run: |
          if [ -f "README.md" ] || [ -f "README_zh.md" ]; then
            echo "[OK] README present"
          else
            echo "[WARN] README missing"
          fi

      - name: NOTICE check
        run: |
          if [ -f "NOTICE" ]; then
            echo "[OK] NOTICE present"
          else
            echo "[WARN] NOTICE missing"
          fi

      - name: Dockerfile check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "[OK] Dockerfile present"
            # 语法检查（不实际构建）
            docker run --rm -i hadolint/hadolint < Dockerfile 2>&1 || echo "[WARN] hadolint issues (non-blocking)"
          else
            echo "[INFO] No Dockerfile, skipping"
          fi

      - name: docker-compose check
        run: |
          if [ -f "docker-compose.yml" ]; then
            echo "[OK] docker-compose.yml present"
          fi
